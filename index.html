<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Veltrix Fund</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Cabeçalho -->
  <header>
    <h1>Bem-vindo à Veltrix Fund</h1>
    <img src="assets/logo.png" alt="Veltrix Fund Logo">
  </header>

  <!-- Como Funciona -->
  <section class="como-funciona">
    <h3>Como Funciona</h3>
    <div class="steps">
      <div class="step">
        <img src="assets/invest.png" alt="Investir">
        <p>INVISTA</p>
      </div>
      <div class="step">
        <img src="assets/gain.png" alt="Ganhar">
        <p>GANHE</p>
      </div>
      <div class="step">
        <img src="assets/withdraw.png" alt="Saque">
        <p>SAQUE</p>
      </div>
    </div>
  </section>

  <!-- Prova Social -->
  <section class="testimonials">
    <h3>Prova Social</h3>
    <p>"Veltrix mudou minha vida! Lucros rápidos."</p>
    <p>"Melhor plataforma de investimentos! 5 estrelas."</p>
    <p>"Saquei meus lucros em minutos. Recomendo!"</p>
  </section>

  <!-- Conquistas -->
  <section class="conquistas">
    <h3>Conquistas</h3>
    <div class="medals">
      <img src="assets/medal-bronze.png" alt="Medalha Bronze">
      <img src="assets/medal-prata.png" alt="Medalha Prata">
      <img src="assets/medal-ouro.png" alt="Medalha Ouro">
      <img src="assets/medal-diamante.png" alt="Medalha Diamante">
    </div>
  </section>

  <!-- Menu inferior -->
  <footer class="menu">
    <nav>
      <a href="index.html">Página Inicial</a>
      <a href="produtos.html">Produtos</a>
      <a href="equipa.html">Equipa</a>
      <a href="sobre.html">Sobre</a>
      <a href="termos.html">Termos</a>
      <a href="trocar-senha.html">Trocar Senha</a>
    </nav>
  </footer>
</body>
</html>
